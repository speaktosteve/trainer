name: Build and Deploy

permissions:
  contents: read
  id-token: write
  pull-requests: write # Required for PR comments (Bundle Size)
  checks: write # Required for detailed test reports

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_test:
    name: Build and Test
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1

      - run: npm ci

      - name: Check Linting
        run: vp run check

      - name: Run Tests with Coverage
        # --coverage triggers the report; Vite+ handles the Summary auto-injection
        run: vp test --run --coverage

      - name: Build and Report Bundle Size
        # This action automatically finds your build folder (dist)
        # and leaves a PR comment with the size changes.
        uses: preactjs/compressed-size-action@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          build-script: "build"
          pattern: "{dist,build}/**/*.{js,css,html}"

  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build_and_test
    runs-on: ubuntu-latest
    name: Deploy to Azure Container Apps
    env:
      ACR_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
      CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
      IMAGE_NAME: ${{ vars.AZURE_CONTAINER_IMAGE_NAME }}
      OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
      OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate required repository variables
        run: |
          missing=()

          if [ -z "$ACR_NAME" ]; then
            missing+=("AZURE_CONTAINER_REGISTRY_NAME")
          fi

          if [ -z "$CONTAINER_APP_NAME" ]; then
            missing+=("AZURE_CONTAINER_APP_NAME")
          fi

          if [ -z "$IMAGE_NAME" ]; then
            missing+=("AZURE_CONTAINER_IMAGE_NAME")
          fi

          if [ -z "$RESOURCE_GROUP" ]; then
            missing+=("AZURE_RESOURCE_GROUP")
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub repository variables:" >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi
      - name: Validate required secrets
        env:
          AZURE_CLIENT_ID_VALUE: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID_VALUE: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID_VALUE: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_STORAGE_CONNECTION_STRING_VALUE: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          missing=()

          if [ -z "$AZURE_CLIENT_ID_VALUE" ]; then
            missing+=("AZURE_CLIENT_ID")
          fi

          if [ -z "$AZURE_TENANT_ID_VALUE" ]; then
            missing+=("AZURE_TENANT_ID")
          fi

          if [ -z "$AZURE_SUBSCRIPTION_ID_VALUE" ]; then
            missing+=("AZURE_SUBSCRIPTION_ID")
          fi

          if [ -z "$AZURE_STORAGE_CONNECTION_STRING_VALUE" ]; then
            missing+=("AZURE_STORAGE_CONNECTION_STRING")
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub secrets:" >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade --yes
      - name: Build and Push to ACR
        run: |
          az acr login --name "$ACR_NAME"
          IMAGE_TAG="$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
      - name: Update Container App
        env:
          STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
        run: |
          env_args=(
            "AZURE_STORAGE_CONNECTION_STRING=$STORAGE_CONNECTION_STRING"
            "HOST=0.0.0.0"
            "PORT=3000"
          )

          if [ -n "$OPENAI_ENDPOINT" ]; then
            env_args+=("AZURE_OPENAI_ENDPOINT=$OPENAI_ENDPOINT")
          fi

          if [ -n "$OPENAI_KEY" ]; then
            env_args+=("AZURE_OPENAI_KEY=$OPENAI_KEY")
          fi

          if [ -n "$OPENAI_DEPLOYMENT" ]; then
            env_args+=("AZURE_OPENAI_DEPLOYMENT=$OPENAI_DEPLOYMENT")
          fi

          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_TAG" \
            --set-env-vars "${env_args[@]}"
