services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: trainer-azurite
    command:
      - azurite-table
      - --tableHost
      - 0.0.0.0
      - --tablePort
      - "10002"
      - --location
      - /data
    ports:
      - "10002:10002"
    volumes:
      - ./.azurite:/data

  app:
    build:
      context: .
    image: trainer:local
    container_name: trainer-app
    depends_on:
      - azurite
    env_file:
      - .env
    environment:
      AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;TableEndpoint=http://azurite:10002/devstoreaccount1;
      HOST: 0.0.0.0
      PORT: "3000"
    ports:
      - "3000:3000"
